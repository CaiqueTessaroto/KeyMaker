<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" sizes="16x16" href="icons/16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="icons/48.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KeyMaker - Help</title>

    <link rel="stylesheet" href="style.css">

    <script src="help.js" defer></script>

    <style>
        body {
            width: 420px;
            min-height: 100vh;
            padding: 20px;
        }

        .help-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .help-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px;
            backdrop-filter: blur(12px);
        }

        .help-card h2 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .help-card p,
        .help-card li {
            line-height: 1.6;
            opacity: .95;
        }

        .help-card ol {
            margin-left: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 8px;
        }

        .logo h1 {
            margin: 0;
            font-size: 28px;
        }

        .back-container {
            display: flex;
            justify-content: center;
            margin-top: 4px;
        }

        .back-button {
            width: 100%;
            padding: 12px 16px;

            border: 1px solid var(--border-color);
            border-radius: 14px;

            background: var(--card-bg);
            color: var(--text-color);

            font-size: 14px;
            font-weight: 600;

            cursor: pointer;

            backdrop-filter: blur(12px);

            transition:
                transform .15s ease,
                background .15s ease,
                border-color .15s ease,
                box-shadow .15s ease;
        }

        .back-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .15);
        }

        .back-button:active {
            transform: translateY(0);
        }

        .back-button:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .footer {
            text-align: center;
            opacity: .6;
            font-size: 12px;
            margin-top: 8px;
        }


        .support-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 14px;
        }

        .support-link {
            display: block;

            text-decoration: none;
            text-align: center;

            padding: 12px;

            border-radius: 10px;
            border: 1px solid var(--border-color);

            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);

            transition:
                transform .15s ease,
                background .15s ease,
                box-shadow .15s ease;
        }

        .support-link:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .15);
        }

        .support-link:visited {
            color: var(--text-color);
        }
    </style>
</head>

<body>

    <div class="help-container">

        <div class="logo">
            <h1>🔑 KeyMaker</h1>
        </div>

        <div class="help-card">
            <h2 id="whatIsTitle"></h2>
            <p id="whatIsText"></p>
        </div>

        <div class="help-card">
            <h2 id="howWorksTitle"></h2>

            <ol>
                <li id="step1"></li>
                <li id="step2"></li>
                <li id="step3"></li>
                <li id="step4"></li>
                <li id="step5"></li>
                <li id="step6"></li>
                <li id="step7"></li>
            </ol>

            <p id="sameInputText"></p>
        </div>

        <div class="help-card">
            <h2 id="privacyTitle"></h2>
            <p id="privacyText"></p>
        </div>

        <div class="help-card">
            <h2 id="supportTitle">❤️ Support KeyMaker</h2>

            <p id="supportText">
                KeyMaker is free, open-source and developed independently.
            </p>

            <div class="support-links">

                <a href="https://github.com/CaiqueTessaroto/KeyMaker" target="_blank" class="support-link">
                    ⭐ Star on GitHub
                </a>

                <a href="https://buymeacoffee.com/caiquetessaroto" target="_blank" class="support-link">
                    ☕ Buy Me a Coffee
                </a>

                <!-- 
                <a href="https://SEU_SITE.com/donate" target="_blank" class="support-link">
                    ❤️ Donate
                </a>
                -->

            </div>
        </div>

        <div class="back-container">
            <button id="backButton" class="back-button">
                ← Back
            </button>
        </div>

    </div>

</body>

<footer>
    <div class="footer">
        KeyMaker v1.1
    </div>
</footer>

</html>
