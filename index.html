<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <link rel="icon" type="image/png" sizes="16x16" href="icons/16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="icons/48.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="script-src 'self' https://pagead2.googlesyndication.com https://adservice.google.com;">
    <title>KeyMaker</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="app-header">
        <a class="app-wordmark" href="#" title="KeyMaker">
            <span class="key-icon">🔑</span>
            <span class="brand-name">KeyMaker</span>
        </a>
        <div class="header-controls">
            <button class="btn-theme" id="btn_theme" title="Toggle theme"
                aria-label="Toggle light/dark mode">🌙</button>
            <button class="btn-autosave" id="btn_autosave" title="Auto-save enabled"
                aria-label="Enable or disable auto-save" aria-pressed="false">💾</button>
            <button class="btn-eyes" id="button_eyes" title="Show/hide passwords"
                aria-label="Show or hide passwords">👁</button>
            <a class="btn-help" href="explanation.html" title="Help" aria-label="Help">?</a>
        </div>
    </header>

    <!-- MAIN -->
    <main>

        <p class="app-subtitle">Create standardized passwords per site, easy to memorize over time.</p>

        <!-- Input fields -->
        <section class="inputfields" id="inputfields">

            <section id="container_0" class="container">
                <section class="inputfield">
                    <div class="checkboxfield">
                        <button type="button" class="less_checkbox" id="checkbox_button_less_0">−</button>
                        <button type="button" class="more_checkbox" id="checkbox_button_more_0">+</button>
                        <input type="checkbox" id="checkbox_0_0" class="checkbox" name="checkbox_field_0">
                    </div>
                    <div class="selecfield">
                        <select class="order" name="ordem" id="ordem_0"></select>
                        <input class="input" id="password_0" type="password" placeholder="Site / domain" name="myInput">
                    </div>
                </section>
            </section>

            <section id="container_1" class="container">
                <section class="inputfield">
                    <div class="checkboxfield">
                        <button type="button" class="less_checkbox" id="checkbox_button_less_1">−</button>
                        <button type="button" class="more_checkbox" id="checkbox_button_more_1">+</button>
                        <input type="checkbox" id="checkbox_0_1" class="checkbox" name="checkbox_field_1">
                    </div>
                    <div class="selecfield">
                        <select class="order" name="ordem" id="ordem_1"></select>
                        <input class="input" id="password_1" type="password" placeholder="Keyword" name="myInput">
                    </div>
                </section>
            </section>

            <section id="container_2" class="container"></section>

        </section>

        <!-- Add / Remove field -->
        <div class="moreless">
            <button type="button" class="button_less" id="button_less">Remove field</button>
            <button type="button" class="button_more" id="button_more">Add field</button>
        </div>

        <!-- Generate -->
        <button type="button" class="button_play" id="button_play">Generate Password</button>

        <!-- Result -->
        <div class="div_resultado_output">
            <p class="texto_aviso_resultado">Result</p>

            <div class="output-container">
                <input class="output" id="output" type="password" placeholder="Generated password" name="myInput">

                <button type="button" id="button_copy" class="button_copy" title="Copy password">
                    📋
                </button>
            </div>
        </div>

    </main>

    <!-- AD BANNER — Google AdSense -->
    <div class="ad-banner">
        <div class="footer-content">

            <span class="footer-open-source">
                🔓 Open Source
            </span>

            <div class="footer-actions">

                <a href="https://github.com/CaiqueTessaroto/KeyMaker" target="_blank" class="footer-link">
                    ⭐ GitHub
                </a>
            </div>

            <div class="footer-actions">
                <a href="https://buymeacoffee.com/caiquetessaroto" target="_blank" class="footer-link">
                    ☕ Coffee
                </a>
            </div>

        </div>
    </div>

    <!-- TEMPLATE for dynamic fields -->
    <script id="text_template" type="text/template">
        <section class="inputfield">
            <div class="checkboxfield">
                <button type="button" class="less_checkbox" id={{less}}>−</button>
                <button type="button" class="more_checkbox" id={{more}}>+</button>
                <input type="checkbox" id={{id}} class="checkbox" name={{name}}>
            </div>
            <div class="selecfield">
                <select class="order" name="ordem" id={{ordem}}></select>
                <input class="input" id={{password}} type="password" placeholder="Keyword" name="myInput">
            </div>
        </section>
    </script>

    <!-- Scripts externos (sem inline, sem type=module) -->
    <script src="theme.js"></script>
    <script src="main.js"></script>

    <script src='i18n.js'></script>
</body>

</html>
